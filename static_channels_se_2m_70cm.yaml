schema_version: 1
description: Static Swedish 2m and 70cm bandplan channels for optional CHIRP export. These are not repeaters; they are fixed
  simplex/APRS/activity/gateway channels that may be appended/prepended separately from SK6BA repeater imports.
sources:
- source_id: ssa_144_146_mhz_2020_11_26_sm7gvf
  title: Bandplan 144 - 146 MHz
  edition: '2020-11-26'
  author: SM7GVF
  file: 144 MHz.pdf
- source_id: ssa_432_438_mhz_2020_11_26_sm7gvf
  title: Bandplan 432 - 438 MHz
  edition: '2020-11-26'
  author: SM7GVF
  file: 432 MHz.pdf
integration_notes:
  normalized_channel_mapping: Load each entry as a NormalizedChannel with source_type='static_bandplan'. Do not run SK6BA
    repeater-specific filters on these rows.
  default_placement: Ask user whether to add none/beginning/end; default none unless user chooses static channels.
  deduplication: Warn if a static channel frequency duplicates an imported channel; let user keep both, skip static duplicate,
    or stop.
  naming: Static channels should support the same name tokens as imported channels plus {label} and {category}.
  repeater_policy: Generic repeater input/output channel ranges from the bandplans are intentionally excluded because real
    repeaters should come from SK6BA/Marks data.
  segment_policy: Broad ranges such as satellite segments are intentionally excluded unless represented by a specific named/channelized
    frequency.
default_category_selection_when_user_adds_static_channels:
  simplex: true
  aprs: true
  calling: true
  image_activity: false
  data_activity: false
  packet: false
  internet_voice_gateway: false
  dv_internet_gateway: false
  digital_channel: false
  weak_signal_activity: false
  space_communication: false
  lora: false
  atv_talkback: false
  microwave_talkback: false
